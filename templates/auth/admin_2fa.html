{% extends "base.html" %}

{% block title %}Verificacion 2FA{% endblock %}

{% block content %}
<div class="row justify-content-center" data-reveal>
    <div class="col-md-5">
        <div class="app-card p-4 p-md-5">
            <p class="eyebrow mb-2">ADMIN</p>
            <h2 class="mb-3">Verificacion 2FA</h2>
            <p class="soft-text">Ingresa el codigo de 6 digitos enviado a tu correo.</p>
            <form method="post" class="stack-sm mt-3">
                <input type="text" name="codigo" class="form-control app-input" maxlength="6" pattern="[0-9]{6}" required>
                <button class="btn app-btn-primary">Validar codigo</button>
                <a href="{{ url_for('auth_bp.login') }}" class="btn app-btn-ghost">Volver</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
