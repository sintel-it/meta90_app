services:
  - type: web
    name: meta90-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_DEBUG
        value: "0"
      - key: COOKIE_SECURE
        value: "1"
      - key: COOKIE_SAMESITE
        value: "Lax"
      - key: ENABLE_TEST_NOTIFICATIONS
        value: "0"
      - key: FORCE_NOTIFICATIONS_TEST
        value: "0"
      - key: NOTIFICATIONS_FORCE_EACH_RUN
        value: "0"
      - key: DB_PATH
        value: /var/data/metas.db
